name: Spinlog
options:
  bundleIdPrefix: com.shimondeitel.spinlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Spinlog:
    type: application
    platform: iOS
    sources:
      - path: Spinlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spinlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Spinlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SpinlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SpinlogTests
      - path: Spinlog.storekit
    dependencies:
      - target: Spinlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spinlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SpinlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SpinlogUITests
    dependencies:
      - target: Spinlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spinlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Spinlog:
    build:
      targets:
        Spinlog: all
        SpinlogTests: [test]
        SpinlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Spinlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Spinlog.storekit
      targets:
        - SpinlogTests
        - SpinlogUITests
    archive:
      config: Release
